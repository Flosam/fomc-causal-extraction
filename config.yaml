# ─────────────────────────────────────────────
# FOMC Causal Extraction — Project Configuration
# (non-secret settings only; secrets go in .env)
# ─────────────────────────────────────────────

# ── LLM provider ──────────────────────────────
# Options: "gemini" | "openai"
model_provider: gemini

# Model names per provider
models:
  gemini: gemini-3-flash-preview
  openai: gpt-4o-mini
  github: gpt-4o-mini

# Max thinking tokens (reasoning budget for extended thinking models)
# Controls how many internal reasoning tokens models like o1/o3 can use
# Set to null to use API defaults (recommended for extraction)
max_thinking_tokens: null

# Max output tokens for regular (non-thinking) models
# Set to null to use API defaults (recommended to avoid truncation)
max_output_tokens: null

# ── Batch API settings ────────────────────────
# Configuration for Gemini Batch API (asynchronous processing)
batch_api:
  # Initial wait time (seconds) before first status poll
  poll_initial_delay: 60
  # Maximum time (seconds) between status polls
  poll_max_interval: 600
  # Exponential backoff multiplier for poll intervals
  poll_backoff_factor: 1.5

# ── Economic regimes ──────────────────────────
periods:
  great_moderation:
    label: Great Moderation
    start_year: 1994
    end_year: 2007
    meetings_to_sample: 10

  post_crisis_zlb:
    label: Post-Crisis ZLB Era
    start_year: 2010
    end_year: 2019
    meetings_to_sample: 10

  post_covid:
    label: Post-COVID Surge
    start_year: 2022
    end_year: 2025
    meetings_to_sample: 10

# ── Section targeting ─────────────────────────
target_sections:
  - "Staff Review of the Economic Situation"
  - "Participants' Views on Current Conditions and the Economic Outlook"
  - "Participants Views on Current Conditions"   # alternate header form

# ── Passage segmentation ──────────────────────
passage:
  min_sentences: 1   # never discard a passage — even 1 sentence can have a causal triple
  max_sentences: 10   # group up to 10 sentences together for context
  balance_passages: false  # if true, subsample each period to min(period_counts) before extraction
  max_passages_per_period:  # limit passages per period during extraction (null = no limit)

# ── Prompt refinement held-out set ───────────
held_out_size: 20

# ── Sanity-check canonical causal pairs ──────
# Keywords are short fragments that actually appear in FOMC text.
# Both cause and effect must co-occur in the same passage to count.
canonical_causal_pairs:
  - cause: "interest rate"
    effect: "borrowing"
  - cause: "interest rate"
    effect: "inflation"
  - cause: "oil price"
    effect: "inflation"
  - cause: "dollar"
    effect: "import"
  - cause: "fiscal"
    effect: "demand"
  - cause: "financial conditions"
    effect: "investment"
  - cause: "unemployment"
    effect: "wage"
  - cause: "asset purchase"
    effect: "yield"
  - cause: "inflation expectation"
    effect: "wage"
  - cause: "supply chain"
    effect: "inflation"
  - cause: "labor market"
    effect: "wage"
  - cause: "consumer"
    effect: "spending"

# ── Failure mode labels (for judge) ──────────
failure_modes:
  - Hallucination        # cause/effect not present in source
  - Hedge Failure        # hedging flattened to certainty
  - Overclaiming         # directional claim stronger than source
  - Scope Error          # relation mis-scoped (wrong subject/object)
  - Correlation/Causation # correlation stated as causation
  - Other
