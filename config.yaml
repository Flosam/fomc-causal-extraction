# ─────────────────────────────────────────────
# FOMC Causal Extraction — Project Configuration
# (non-secret settings only; secrets go in .env)
# ─────────────────────────────────────────────

# ── LLM provider ──────────────────────────────
# Options: "gemini" | "openai"
model_provider: github

# Model names per provider
models:
  gemini: gemini-2.0-flash
  openai: gpt-4o
  github: gpt-4o-mini

# ── Economic regimes ──────────────────────────
periods:
  great_moderation:
    label: Great Moderation
    start_year: 1994
    end_year: 2007
    meetings_to_sample: 10

  post_crisis_zlb:
    label: Post-Crisis ZLB Era
    start_year: 2010
    end_year: 2019
    meetings_to_sample: 10

  post_covid:
    label: Post-COVID Surge
    start_year: 2022
    end_year: 2025
    meetings_to_sample: 10

# ── Section targeting ─────────────────────────
target_sections:
  - "Staff Review of the Economic Situation"
  - "Participants' Views on Current Conditions and the Economic Outlook"
  - "Participants Views on Current Conditions"   # alternate header form

# ── Passage segmentation ──────────────────────
passage:
  min_sentences: 1   # never discard a passage — even 1 sentence can have a causal triple
  max_sentences: 5   # group up to 5 sentences together for context

# ── Prompt refinement held-out set ───────────
held_out_size: 20

# ── Sanity-check canonical causal pairs ──────
# Keywords are short fragments that actually appear in FOMC text.
# Both cause and effect must co-occur in the same passage to count.
canonical_causal_pairs:
  - cause: "interest rate"
    effect: "borrowing"
  - cause: "interest rate"
    effect: "inflation"
  - cause: "oil price"
    effect: "inflation"
  - cause: "dollar"
    effect: "import"
  - cause: "fiscal"
    effect: "demand"
  - cause: "financial conditions"
    effect: "investment"
  - cause: "unemployment"
    effect: "wage"
  - cause: "asset purchase"
    effect: "yield"
  - cause: "inflation expectation"
    effect: "wage"
  - cause: "supply chain"
    effect: "inflation"
  - cause: "labor market"
    effect: "wage"
  - cause: "consumer"
    effect: "spending"

# ── Failure mode labels (for judge) ──────────
failure_modes:
  - Hallucination        # cause/effect not present in source
  - Hedge Failure        # hedging flattened to certainty
  - Overclaiming         # directional claim stronger than source
  - Scope Error          # relation mis-scoped (wrong subject/object)
  - Correlation/Causation # correlation stated as causation
  - Other
